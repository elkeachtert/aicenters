# ----------------------------------------------------------------------------------------
# Hero Area (Big Picture)
# ----------------------------------------------------------------------------------------        
  [params.hero]
    enable              = true
    title               = "A top spot for AI and ML research in Europe"
	subtitle            = "We attract the most promising researchers from all career levels to our center and transfer innovations and AI potential to industry and society."
    vision              = "Unite leading researchers in Germany, to strengthen international, national and regional competence in the field of ML and AI. We foster talent and make corresponding potential accessible to users from science, industry and society."
	description         = "MCML is one of six national AI Competence Centers. It is funded on a permanent basis by the German and Bavarian government's AI strategy, and brings together the leading ML researchers from LMU, TUM and associated institutions."

# ----------------------------------------------------------------------------------------
# Disable all tracking (DSVGO)
# ----------------------------------------------------------------------------------------
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.twitter]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true
