# ----------------------------------------------------------------------------------------
# Navigation
# ----------------------------------------------------------------------------------------      
[params.navigation]
	home  = "Home"
    logo = "images/aicenters.png"
    
  # News #  
  [[params.navigation.entry]]
    id = "news"
    name = "News"
    linkto = "/news/"
    hasChildren = "false"
       
  # Partner Programs #    
  [[params.navigation.entry]]
    id = "partner"
    name = "Partner Programs"
    linkto = "/partner-programs/"	
    hasChildren = "false"  

  # European Network #    
  [[params.navigation.entry]]
    id = "network"
    name = "European Network"
    linkto = "/european-network/"	
    hasChildren = "false"
	  
