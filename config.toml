baseURL = "https://dbs.ifi.lmu.de"
languageCode = "en"
title = "German AI Centers of Excellence"

titleCaseStyle = 'ap'

#disableKinds = ['taxonomy', 'term']

[taxonomies]
	category = "categories"
	tag = "tags" 

[pagination]
	pagerSize = 6

[module]
[[module.mounts]]
	source = 'static'
	target = 'static'
	files = ['! images/**/archive']
	
[[module.mounts]]
	source = 'static'
	target = 'assets'
	files = ['! images/**/archive']

[outputFormats.News]
mediaType = "application/json"
baseName = "news"
isPlainText = true
notAlternative = true

[outputs]
	home = [ 'html', 'News' ]
	section = ['html']
	taxonomy = ['html']
	term = ['html']
	
[frontmatter]
  date = ['date', 'publishdate', 'pubdate', 'published', 'lastmod', 'modified']
  expiryDate = ['expirydate', 'unpublishdate']
  lastmod = ['lastmod', ':fileModTime']
  publishDate = ['publishdate', 'pubdate', 'published', 'date']

[blackfriday]
extensions = ["hardLineBreak"]

[markup.goldmark.renderer]
unsafe = true

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[params]

[[params.aicenter]]
name = "DFKI"
image = "/images/logos/dfki.jpg"
link = "https://www.dfki.de/web"

[[params.aicenter]]
name = "BIFOLD"
image = "/images/logos/bifold.jpg"
link = "https://www.bifold.berlin"

[[params.aicenter]]
name = "Scads.AI"
image = "/images/logos/scads.webp"
link = "https://scads.ai"

[[params.aicenter]]
name = "LAMARR"
image = "/images/logos/lamarr.webp"
link = "https://lamarr-institute.org"

[[params.aicenter]]
name = "Tue.AI"
image = "/images/logos/tueai.jpg"
link = "https://tuebingen.ai"

[[params.aicenter]]
name = "MCML"
image = "/images/logos/mcml.webp"
link = "https://mcml.ai"

# ----------------------------------------------------------------------------------------
# Navigation
# ----------------------------------------------------------------------------------------      
[params.navigation]
	home  = "Home"
    logo = "images/aicenters.png"
	  
  # About  
  [[params.navigation.entry]]
    id = "about"
    name = "About"
    linkto = "/about/"
    hasChildren = "false"
    
  # News #  
  [[params.navigation.entry]]
    id = "news"
    name = "News"
    linkto = "/news/"
    hasChildren = "false"
    
  # Research #  
  [[params.navigation.entry]]
    id = "events"
    name = "Events"
    linkto = "/events/"
    hasChildren = "false"
       
  # Partner Programs #    
  [[params.navigation.entry]]
    id = "partner"
    name = "Partner Programs"
    linkto = "/partner_programs/"	
    hasChildren = "false"  

  # European Network #    
  [[params.navigation.entry]]
    id = "network"
    name = "European Network"
    linkto = "/european_network/"	
    hasChildren = "false"  

  [[params.navigation.entry]]
    id = "contact"
    name = "Contact"
    linkto = "/contact/"
	  
# ----------------------------------------------------------------------------------------
# Disable all tracking (DSVGO)
# ----------------------------------------------------------------------------------------
[privacy]
  [privacy.disqus]
    disable = true
  [privacy.googleAnalytics]
    disable = true
  [privacy.instagram]
    disable = true
  [privacy.x]
    disable = true
  [privacy.vimeo]
    disable = true
  [privacy.youtube]
    disable = true
