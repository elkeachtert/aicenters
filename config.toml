baseURL = "https://mcml.ai"
languageCode = "en"
title = "Data Mining Lab @LMU"
description = "The MCML is a top place for AI and ML research in Europe. We attract the most promising researchers from all career levels to our center and transfer innovations and AI potential to industry and society."
paginate = 3

[module]
[[module.mounts]]
    source = 'static'
    target = 'static'
	excludeFiles = ['images/**/archive']

disableKinds = ['taxonomy', 'term']

[outputFormats.Publications]
mediaType = "application/json"
baseName = "publications"
isPlainText = true
notAlternative = true

[outputFormats.Software]
mediaType = "application/json"
baseName = "software"
isPlainText = true
notAlternative = true

[outputFormats.News]
mediaType = "application/json"
baseName = "news"
isPlainText = true
notAlternative = true
	
[outputs]
   home = [ "HTML", "Publications", "Software", "News" ]
   
[frontmatter]
	lastmod = ["lastmod", ":fileModTime"]

#[taxonomies]
#  category = 'categories'
#  series = 'series'
#  tag = 'tags'

[blackfriday]
extensions = ["hardLineBreak"]
[markup.goldmark.renderer]
unsafe="true"

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5
    
[params]

