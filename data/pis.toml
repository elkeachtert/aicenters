uni = "LMU"
affiliation = "Statistical Learning & Data Science"
contact = "https://www.statistik.uni-muenchen.de/personen/professuren/bischl/index.html"
bio = '<p>holds the chair of Statistical Learning and Data Science at the Department of Statistics at LMU Munich.</p><p>He studied Computer Science, Artificial Intelligence and Data Sciences in Hamburg, Edinburgh and Dortmund and obtained his PhD from Dortmund Technical University in 2013 with a thesis on "Model and Algorithm Selection in Statistical Learning and Optimization". His research interests include AutoML, Model Selection, Interpretable ML, as well as the development of Statistical Software. He is a member of ELLIS in general, and a faculty member of ELLIS Munich, an active developer of several R-packages, leads the "mlr" (Machine Learning in R) engineering group and is co-founder of the science platform "OpenML" for open and reproducible ML. Furthermore, he leads the Munich branch of the Fraunhofer ADA Lovelace Center for Analytics, Data &amp; Applications, i.e. a new type of research infrastructure to support businesses in Bavaria, especially in the SME sector.</p>'
subarea = "A1"
director = true
strategyBoard = true
id = "bischl"

