[[abmember]]
name = "Bronstein"
firstName = "Michael"
title = "Prof."
image = "/images/advisoryboard/bronstein.webp"
uni = "University of Oxford"
affiliation = "DeepMind Professor of Artificial Intelligence"
contact = "https://www.cs.ox.ac.uk/people/michael.bronstein/"
bio = "<p>is the DeepMind Professor of AI at the University of Oxford and Head of Graph Learning Research at Twitter. He was previously a professor at Imperial College London and held visiting appointments at Stanford, MIT, and Harvard, and has also been affiliated with three Institutes for Advanced Study. Michael received his PhD from the Technion in 2007. He is the recipient of the Royal Society Wolfson Research Merit Award, Royal Academy of Engineering Silver Medal, five ERC grants, two Google Faculty Research Awards, and two Amazon AWS ML Research Awards. In addition to his academic career, Michael is a serial entrepreneur and founder of multiple startup companies.</p>"

[[abmember]]
name = "Eliassi-Rad"
firstName = "Tina"
title = "Prof."
image = "/images/advisoryboard/eliassi-rad.webp"
uni = "Northeastern University"
affiliation = "Professor of Computer Science"
contact = "http://eliassi.org/"
bio = "<p>is a professor of computer science at Northeastern University. She is also a core faculty member at Northeastern’s Network Science Institute and the Institute for Experiential AI. Tina earned her PhD in computer sciences (with a minor in mathematical statistics) at the University of Wisconsin-Madison.</p>"

[[abmember]]
name = "Garriga"
firstName = "Gemma"
title = "Dr."
image = "/images/advisoryboard/garriga.webp"
uni = "Google"
affiliation = "Director of Applied AI"
contact = "https://www.linkedin.com/in/gemmagarriga/?originalSubdomain=de"
bio = "is the Director of Apllied AI at Google. She obtained her PhD in Machine Learning at the UPC Barcelona and a MBA at Insead. From 2006 till 2013 she worked as a research scientist in Finland and France."

[[abmember]]
name = "Krause"
firstName = "Andreas"
title = "Prof."
image = "/images/advisoryboard/krause.webp"
uni = "ETH Zürich"
affiliation = "Professor of Computer Science"
contact = "https://las.inf.ethz.ch/krausea"
bio = "<p>is a Professor of Computer Science at ETH Zurich, where he leads the Learning &amp; Adaptive Systems Group. He also serves as Academic Co-Director of the Swiss Data Science Center and Chair of the ETH AI Center, and co-founded the ETH spin-off LatticeFlow. Before that he was an Assistant Professor of Computer Science at Caltech. He received his Ph.D. in Computer Science from Carnegie Mellon University.</p>"

[[abmember]]
name = "Schmid"
firstName = "Cordelia"
title = "Prof."
image = "/images/advisoryboard/schmid_c.webp"
copyright = "Marcus Gloger - Körber Stiftung"
uni = "INRIA"
affiliation = "Research Director"
contact = "https://www.linkedin.com/in/cordelia-schmid-47985a9/"
bio = "<p>is a research director at Inria, since 1997 she has held a permanent research position there. Prof. Schmid is a member of the German National Academy of Sciences, Leopoldina and a fellow of IEEE and the ELLIS society. She was awarded the Longuet-Higgins prize in 2006, 2014 and 2016 and the Koenderink prize in 2018, both for fundamental contributions in computer vision that have withstood the test of time. She received an ERC advanced grant in 2013, the Humbolt research award in 2015, the Inria &amp; French Academy of Science Grand Prix in 2016, the Royal Society Milner award in 2020 and the PAMI distinguished researcher award in 2021. Starting 2018 she holds a joint appointment with Google research.</p>"

[[abmember]]
name = "Schuller"
firstName = "Dagmar"
title = "Prof."
image = "/images/advisoryboard/schuller.webp"
uni = "IHK München und Oberbayern"
affiliation = "Vice President"
contact = "https://www.linkedin.com/in/prof-dagmar-m-schuller-2013a023/?originalSubdomain=de"
bio = "<p>is the CEO &amp; Co-Founder of audEEring GmbH, the innovation leader in AI-based audio analysis. She is the Deputy Head of KI Bundesverband and the Vice President of the Chamber of Industry and Commerce (IHK) for Munich and Upper Bavaria - Germany's largest chamber of industry and commerce. Her focus in the presidium is on innovation, new technologies, technology transfer and data economy. Since September 2023, she also holds a professorship für Business Informatics (Wirtschaftsinformatik) at Hochschule Landshut.</p>"

[[abmember]]
name = "Smola"
firstName = "Alex"
title = "Dr."
image = "/images/advisoryboard/smola.webp"
copyright = "alex.smola.org"
uni = "Boson.ai"
affiliation = "CEO & Co-founder"
contact = "https://alex.smola.org/"
bio = "<p>is CEO and Co-Founder of Boson AI where he works on large AI models. Prior to that he was VP and Distinguished Scientist at Amazon Web Services responsible for AI/ML. He worked at CMU as Full Professor in the Machine Learning Department from 2013-2017 and he has taught at UC Berkeley, Stanford and the Australian National University. He also worked at Google, Yahoo Research and NICTA. He received his PhD in Machine Learning from the University of Technology in Berlin in 1998.</p>"
