[[member]]
name = "Seidl"
firstName = "Thomas"
title = "Prof. Dr."
image = "/images/pis/seidl.webp"
position = "Head of group"
contact = "https://www.dbs.ifi.lmu.de/cms/personen/professoren/seidl/index.html"
bio = '''<p>is professor for Computer Science and head of the Database Systems and Data Mining Chair at LMU Munich.</p> 
       <p>His fundamental research on data mining and database technologies with application domains in engineering, 
	   business, life science and humanities yielded more than 300 scientific publications so far. 
	   He serves on many program committees and scientific boards and is co-chair of the LMU Data Science Lab, the ZD.B Innovation Lab, 
	   the Munich School of Data Science @Helmholtz, TUM and LMU (MuDS) and of the Elite Master program in Data Science at LMU.</p>
	   <p>MCML Director, spokeperson, LRZ Director, KI-Rat, etc…</p>'''
id = "seidl"
professor = true
chair = true

