[[card]]
type   = "researchb"
title = "B | Perception, Vision, and Natural Language Processing" 
link  = "/research/areab/" 
text   = "forms a dynamic research domain at the intersection of computer science and cognitive sciences. This field explores the synergies between diverse sensory inputs, visual information processing, and language understanding."
#text  = "constitutes one of the hottest areas of ML. Here, Munich offers unique strengths in Computer Vision, Natural Language Processing (NLP) and Multimodal Perception. In MCML, the leading experts in Computer Vision and Multimodal Perception from TUM join forces with the leading NLP researchers from LMU to develop novel ML methods that will have a significant impact on all areas of ML and data science."

#Multimodal Perception, Vision, and Natural Language Processing (NLP) form a dynamic research domain at the intersection of computer science and cognitive sciences. This field explores the synergies between diverse sensory inputs, visual information processing, and language understanding. By integrating multiple modes of perception, such as images, text, and spoken language, researchers aim to create more robust and human-like systems capable of interpreting and interacting with the world in a holistic manner. The advancements in this area hold great potential for applications ranging from enhanced human-computer interaction to breakthroughs in assistive technologies and autonomous systems.

[[card]]
type   = "researchc"
title = "C | Domain-specific Machine Learning" 
link  = "/research/areac/" 
text  = "shows an immense potential, as both universities have several highly visible scientific domains with internationally renowned experts. This area facilitates translating ML concepts and technologies to many different domains."
#text  = "shows an immense potential in Munich, as both universities have several highly visible scientific domains with internationally renowned experts. The fields of Medicine, Biology, Physics and Geo Sciences, Social Sciences and Humanities were chosen as initial selections for collaboration, due to their scientific excellence and because there already exist strong connections in joint research and education activities. Future extensions in these and further fields are envisioned. The rich environment in the Munich scientific ecosystem inside and outside the universities facilitates translating ML concepts and technologies to many different domains."

