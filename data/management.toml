position = "General Manager"
uni = "LMU"
contact = "https://www.dbs.ifi.lmu.de/cms/personen/mitarbeiter/achtert/index.html"
mail = "contact@mcml.ai"
bio = "<p>is General Manager of the MCML at LMU Munich.</p><p>Together with her colleagues, she is mainly responsible for the administrative management of all activities of the center and is the central contact person for all scientists and institutions involved. She studied Informatics at LMU Munich and subsequently received her PhD there. Before joining MCML, she was coordinator of the ArcheoBioCenter at LMU Munich for many years.</p>"

[[manager]]
name = "Albrecht"
firstName = "Verena"
image = "/images/management/albrecht.webp"
position = "Science Communication Coordinator"
uni = "LMU"
contact = "https://www.dbs.ifi.lmu.de/cms/personen/mitarbeiter/albrecht/index.html"
mail = "contact@mcml.ai"
bio = "<p>is Science Manager for Communication at MCML.</p><p>She is the central contact person for all PR activities and public relations of MCML. She received her MSc in Consumer Science at TU Munich. Before joining MCML, she worked at a communications agency, where she gained professional know-how as well as practical experience with the entire range of PR instruments.</p>"

[[manager]]
name = "Helmick"
firstName = "Arielle"
title = "Dr."
image = "/images/management/helmick.webp"
position = "General Manager"
uni = "TUM"
mail = "contact@mcml.ai"
bio = "<p>is the Center Manager for MCML at TU Munich.</p><p>She studied Gender Studies, Sociology and North American Cultural Studies at Vanderbilt University (USA) and LMU Munich. She received her PhD in North American cultural history from LMU Munich. Arielle spent fifteen years in academic management at LMU Munich: first at the Lasky Center for Transatlantic Studies and then for many years at the Rachel Carson Center for Environment and Society.</p>"

[[manager]]
name = "Lauks"
firstName = "Juliane"
title = "Dr."
image = "/images/management/lauks.webp"
position = "Science Manager"
uni = "LMU"
contact = "https://www.slds.stat.uni-muenchen.de/people/lauks/"
mail = "contact@mcml.ai"
bio = "<p>is Science Manager of MCML at LMU Munich.</p><p>She holds a PhD in Neuroscience from the Vrije Universiteit Amsterdam. Before joining the MCML she coordinated the PhD progam in experimental medicine at the University of Tübingen, worked as a business analyst for several years in the IT department of the University Hospital of Basel, and managed the H2020 Marie Skłodowska Curie Innovative Training Network ChroMe at the the Ladurner lab.</p>"

[[manager]]
name = "Meier"
firstName = "Thomas"
title = "Dr."
image = "/images/management/meier.webp"
position = "Science Manager Collaborations"
uni = "LMU"
contact = "https://www.dbs.ifi.lmu.de/cms/personen/mitarbeiter/meier/index.html"
mail = "contact@mcml.ai"
bio = "<p>is Science Manager for Collaborations at MCML.</p><p>Please contact him anytime for inquiries on collaborations with MCML. He studied Philosophy at the University of Zacatecas in Mexico and Philosophy and Linguistics at LMU Munich and received his PhD at the Munich Center for Mathematical Philosophy at LMU Munich. Besides MCML, he teaches BA-courses on the Philosophy of Science, Epistemology, Philosophy of Language, and Analytic Philosophy.</p>"

[[manager]]
name = "Stang"
firstName = "Alexandra"
title = "Dr."
image = "/images/management/stang.webp"
position = "Science Manager Academic Partnerships and Outreach"
uni = "TUM"
mail = "contact@mcml.ai"
bio = "<p>is Science Manager for Academic Partnerships and Outreach at TU Munich.</p><p>She studied at Johannes Gutenberg-Universität Mainz, Helsinki University and Freie Universität Berlin and holds a PhD in Comparative Literature from Helsinki University. Before joining MCML, Alexandra worked for many years in different positions at the Goethe-Institut in Finland and Germany, amongst others as project lead for AI and ethics.</p>"
