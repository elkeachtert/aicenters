<div class="card card-news mb-2 mt-2 pt-0 pb-0 b-none" style="background-color: transparent">
	<a href="{{ .permalink }}" aria-label="Read more about {{ .title }}" class="stretched-link card-link"></a>
	<div class="card-body pt-0 pb-0">
		<div class="row mt-0 mb-0 pt-0 pb-0">
			<div class="col-lg-12 mt-0 mb-0 ps-3 ps-md-0 pe-3 pb-2">
				<p class="card-title p-xs mb-1 gray">{{ .date }}</p>
				<div class="col me-3 floatleft mb-2">
					<img src="{{ .img }}" alt="{{ .title }}" width="300" height="200" class="img-100"><br>
					<p class="pt-0 pb-0 mb-1 copyright">{{ .copyright }}</p>
				</div>
				<h3 class="h4 card-title">{{ .title }}</h3>
				<p class="card-title p-s bold">{{ .subtitle }} </p>
				<p class="card-text p-xs">{{ .description | truncate 150 }}</p>
				{{ partial "learnMore" (dict "link" .permalink "size" "small" "text" "Read more") -}}
			</div>
		</div>
	</div>	
</div>
