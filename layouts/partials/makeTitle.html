<div class="container-fluid"> 
	{{ if .Params.video -}}
	<video class="background-video1" autoplay playsinline muted loop>
		<source src="{{ .Params.video }}.mp4" type="video/mp4" poster="{{ .Params.bgImg }}">
	</video>
	{{ end -}}
	
	<div class="row row-cols-1 row-cols-lg-2">
		<div class="col" >
		{{ if eq .Layout "member" -}}
		  <h1>{{ .Params.academicTitle }} {{ .Params.firstName }} {{ .Params.name }} </h1>
		{{ else if .Params.shorttitle -}}
			<h1 data-cms-bind="#shorttitle">{{ .Params.shorttitle | markdownify }}</h1>
		{{ else -}}
			<h1 data-cms-bind="#title">{{ .Title }}</h1>
		{{ end -}}
		</div>
	</div>
</div>
