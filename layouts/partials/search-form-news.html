
<div class="col-12 justify-content-end mt-0" style="text-align: right">
	<form id="custom-search" name="custom-search" method="post" action="" onsubmit="customSearchResults(); return false;">
    {{ if .Params.isSW -}}
	<input id="custom-search-field" type="text" name="search" value="" title="Search String" placeholder="Search Software">
	{{ else -}}
	<input id="custom-search-field" type="text" name="search" value="" title="Search String" placeholder="Search News">
	{{ end -}}

</div>

<div id="custom-search-results" class="row row-cols-1 mt-0">
</div>
