<div class="row mb-lg-5 mt-lg-5">
	<div class="col col-12 col-lg-4 pe-lg-4 txtTwoCol">
		<h2 id="{{ .Get "id" }}">{{ .Get "title" | markdownify }}</h2>
	</div>
	<div class="col col-12 col-lg-8 txtTwoCol">
		<p class="bold"><a href="mailto:{{ .Get "contact" }}"><i class="fa-solid fa-envelope fa-2x"></i>&nbsp;{{ .Get "mailtxt" }}</a></p>		
		{{ partial "myMarkdownify" (dict "txt" (.Get "txt")) }}
	</div>
</div>
