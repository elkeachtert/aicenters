{{"<!-- Hero Area Start -->" | safeHTML}}	
<section class="list-content">
	<div class="container-fluid hero-area">
		<div class="row pt-3 pb-3">
			<div class="col-2 col-md-4">
				<div class="row ">
					{{ range sort hugo.Data.aicenters "name" -}}
					<div class="col-12 col-md-6 pt-2 pb-2">
						<a href="{{ .link }}">
							<img src="{{ .image }}" class="img-partner" alt="{{ .name }}" width=2 height=1 style="width:100%; height:auto;">
						</a>
					</div>
					{{ end -}}
				</div>
			</div>

			<div class="col-10 col-md-6">
				<img src="/images/logos/german_ai_centers.webp" alt="The Network of the German AI Centers of Excellence" width=3 height=2 style="width:100%; height:auto;">
				<p class="mt-1 pb-0 mb-1 p-xs gray">The Network of the German AI Centers of Excellence</p>
			</div>
		</div>
	</div>
</section>
{{"<!-- Hero Area End -->" | safeHTML}}
