        - key: quote
        - "Quote"
      metadata:
        - text:
          - key: name
        - text:
          - key: position
        - text:
          - key: size
    picker_preview:
      gallery:
        image: /examples/quote.png
        text: "Quote"
    definitions:
      shortcode_name: quoteRight
      named_args:
        - editor_key: name
          type: string
        - editor_key: position
          type: string
        - editor_key: quote
          type: string
        - editor_key: img
          type: string
        - editor_key: copyright
          type: string
          optional: true
        - editor_key: size
          type: string
          optional: true
    _inputs:
      name:
        type: text
      position:
