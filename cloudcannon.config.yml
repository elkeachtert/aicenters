paths:
  data: data
  collections: content
  includes: layouts
  layouts: layouts
  static: static
  uploads: static/images
  source: ''
  archetypes: archetypes
  assets: assets
  content: content
  pages: content
  publish: public
  config: ''
collections_config:
  sections:
    path: content
    output: true
    filter: strict
    parse_branch_index: true
    icon: notes
    _inputs:
      shorttitle: 
        type: text
        comment: "<h1> at top of the page (if empty title is used)"
 
  professors:
    path: content/team/professors
    output: true
    icon: person
    schema: member
    create:
      path: '{name|lowercase}-{firstName|lowercase}/index.md'
      _inputs:
        name:
          comment: Use the last name here
        firstName:
          comment: Use the first name here
    schemas:
      member:
        path: schemas/member.md
        
  office:
    path: content/team/office
    output: true
    icon: person
    schema: member
    create:
      path: '{name|lowercase}-{firstName|lowercase}/index.md'
      _inputs:
        name:
          comment: Use the last name here
        firstName:
          comment: Use the first name here
    schemas:
      member:
        path: schemas/member.md
        
  mcml:
    path: content/team/mcml
    output: true
    icon: person
    schema: member
    create:
      path: '{name|lowercase}-{firstName|lowercase}/index.md'
      _inputs:
        name:
          comment: Use the last name here
        firstName:
          comment: Use the first name here
    schemas:
      member:
        path: schemas/member.md
        
  scientists:
    path: content/team/scientists
    output: true
    icon: person
    schema: member
    create:
      path: '{name|lowercase}-{firstName|lowercase}/index.md'
      _inputs:
        name:
          comment: Use the last name here
        firstName:
          comment: Use the first name here
    schemas:
      member:
        path: schemas/member.md
        
  research:
    path: content/research
    output: true
    icon: psychology
    schema: researchArea
    create:
      path: '{title|lowercase}/index.md'
      _inputs:
        title:
          comment: Title of research area 
    schemas:
      researchArea:
        path: schemas/researchArea.md
    _inputs:
      leader:
        type: url
      members:
        type: array
      members[*]:
        txpe: url
      link:
        comment: "External link to research site"
      teaser:
        type: html
        options:
          bold: true
          italic: true
          format: p 
          subscript: true
          superscript: true
          link: true
          styles: /css/editor.css
        comment: Teaser text (top of page)

  news:
    path: content/news
    output: true
    icon: notes
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schema: news-extern
    uploads: '[base_path]'
    create:
      path: '{date|year}-{date|month}-{date|day}-{slug}/index.md'
      _inputs:
        date:
          comment: Use the publishing date here
        slug:
          comment: This is used for your directory name
    schemas:
      news-extern:
        path: schemas/news-extern.md
    _inputs:  
      title: 
        type: textarea
        comment: "Title of news item (<h1> at top of the page)"
      subtitle: 
        type: textarea
        comment: "Subtitle of news item (<h2> next to image)"
      teaser: 
        type: html
        comment: "Teaser text (appears in news overview)"  
        options:
          bold: true
          italic: true
          format: p 
          subscript: true
          superscript: true
          link: true
          styles: /css/editor.css
      img: 
        type: image
        comment: "Teaser image"
      copyright: 
        type: text
        comment: "Copyright for teaser image"
      link:
        comment: "External link to news item"
      date:
        type: date
        comment: "Publishing date"
      tags:
        type: array
        comment: "Only te first tag is used for related news"
      tags[*]:
        type: select
        options:
          values:
            - event
            - press
            - award
            - podcast
            - training
            - conference
            - jobs
            - research
            - dssg
  
  
  data:
    path: data
    output: false
    icon: notes
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    _inputs:
      bio: 
        type: html
        optional: true
        options:
          format: p 
      contact: 
        type: url
      mail: 
        type: email
      title:
        type: select
        options:
          values:
            - Prof. Dr.
            - Dr.
            - PD Dr.
      uni:
        type: select
        options:
          values:
            - LMU
            - TUM
            - Helmholtz AI
      subarea:
        type: select
        options:
          values:
            - A1
            - A2
            - A3
            - B1
            - B2
            - B3
            - C1
            - C2
            - C3
            - C4
            - C5
      director:
        type: checkbox
        default: false
        optional: true
      strategyBoard:
        type: checkbox
        default: false
        optional: true
      funding:
        type: checkbox
        default: true
        optional: true
        

_inputs: 
  title: 
    type: text
    comment: "Title of the page (used for seo)"
        
  description: 
    type: textarea
    comment: "Description of the page (used for seo). Max. 150 characters!"
    
  layout:
    hidden: true
  
  order:
    hidden: true
      
  sectionLinks:
    type: array
    comment: "Links to sections"
    options:
      structures: _structures.sectionLinks          
      preview:
        text:
          - key: title
        image:
          - key: img
        subtext:
          - key: text
          
  name: 
    type: text
  firstName: 
    type: text
  academicTitle: 
    type: select
    options:
      values:
        - Prof. Dr.
        - Dr.
        - "-none-"
  img: 
    type: image
    comment: "Image (1x1)"      
  copyright: 
    type: text
    comment: "Copyright for image (optional)"      
  position: 
    type: text
  phone: 
    type: text 
  fax: 
    type: text 
    comment: "optional"
  room: 
    type: text 
  mail: 
    type: url  
  officeHours:
    type: array
  officeHours[*]:
    type: text
  
  bio: 
    type: html
    comment: "Short biography"
  website:
    type: url
  workingGroups: 
    type: array
    structures: _structures.workingGroups          
        
_select_data: {}
_structures: 
  sectionLinks:
    values:
      - value:
          title: 
          img: 
          copyright: 
          link: 
          text: 
        _inputs:
          title: 
            comment: "Title of the section"
          img:
            type: image
          text: 
            comment: "Teaser text of section"
            type: textarea
            
  workingGroups:
    values:
      - value:
          link: 
        _inputs:
          link:
            type: url
                    
  speakers:
    values:
      - value:
          name: 
          affiliation: 
  manager:
    values:
      - value:
          name: 
          firstName:
          title:
          image:
          position:
          uni:
          contact:
          mail:
          bio:
        preview:
          text:
            - key: name
          subtext:
            - key: firstName
          image:
            - key: image
          icon: person  
          metadata:  
          - text: 
            - key: position
          - text: 
            - key: uni
  pi:
    values:
      - value:
          name: 
          firstName:
          title:
          image:
          uni:
          affiliation:
          contact:
          bio:
          subarea:
          director:
          strategyBoard:
          id:
        preview:
          text:
            - key: name
          subtext:
            - key: firstName
          image:
            - key: image
          icon: person  
          metadata:  
          - text: 
            - key: subarea
          - text: 
            - key: uni
            
  phd:
    values:
      - value:
          name: 
          firstName:
          title:
          image:
          contact:
          position:
          funding:
          piID:
        preview:
          text:
            - key: name
          subtext:
            - key: firstName
          image:
            - key: image
          icon: person  
          metadata:  
          - text: 
            - key: piID
            
  ab:
    values:
      - value:
          name: 
          firstName:
          title:
          image:
          uni:
          affiliation:
          contact:
          bio:
        preview:
          text:
            - key: name
          subtext:
            - key: firstName
          image:
            - key: image
          icon: person  
          metadata:  
          - text: 
            - key: uni
_editables:
  text:
    italic: true
  block:
    format: p h3
    undo: true
    redo: true
  content:
    blockquote: false
    bold: true
    format: p h2 h3 h4 h5 h6 div
    italic: true
    strike: true
    subscript: true
    superscript: true
    underline: true
    link: true
    bulletedlist: true
    indent: true
    numberedlist: false
    outdent: true
    code: true
    embed: true
    horizontalrule: true
    image: true
    table: true
    undo: true
    redo: true
    removeformat: true
    copyformatting: true
    styles: /css/editor.css
    left: align-left
    center: align-center
    right: align-right
    justify: align-justify
    image_size_attributes: true
    snippet: true
data_config: true
editor:
  default_path:
timezone: Etc/UTC

_snippets:
  hugo_cardFunding:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: 
      - key: title
      - "Title"
      icon: image
      image: 
        key: img
      metadata:
        - text: 
          - key: subtitle
          - "Subtitle"
        - text:
          - key: fundingName
          - "Funding agency"
        - text:
          - key: period
          - "01/2022 - 05/2024"
    picker_preview:
      gallery:
        image: /examples/announcement.png
        text: "Title"
    definitions:
      shortcode_name: cardFunding
      named_args:
        - editor_key: title
          type: string
        - editor_key: subtitle
          type: string
        - editor_key: fundingName
          type: string
        - editor_key: fundingLink
          type: string
        - editor_key: period
          type: string
        - editor_key: teaser
          type: string
        - editor_key: img
          type: string
        - editor_key: copyright
          type: string
        - editor_key: link
          type: string
    _inputs:
      title:
        type: text
      subtitle:
        type: text
      fundingName:
        type: text
      fundingLink:
        type: url
      period:
        type: text
      teaser:
        type: html
        options: 
          bold: true
          link: true
          bulletedlist: true
          indent: true
          undo: true
          redo: true
      img:
        type: image  
      copxright:
        type: text
      Link:
        type: url
          
  hugo_announcement:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: "Announcement"
      metadata:
        - text: "We are happy to announce that MCML researchers are represented with the following papers at"
        - text:
          - key: conference
          - "Conference"
    picker_preview:
      gallery:
        image: /examples/announcement.png
        text: "Announcement"
    definitions:
      shortcode_name: announcement
      named_args:
        - source_key: conf
          editor_key: conference
          type: string
        - source_key: conflink
          editor_key: conferenceLink
          type: string
    _inputs:
      conference:
        type: text
        comment: "Conference abbreviation, e.g. CVPR 2023"
      conferenceLink:
        type: url
        
  hugo_contribution:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      icon: collections
      text: "Published paper (or article)"
      metadata:
        - text:
          - key: title
          - "Title"
        - text:
          - key: author  
          - "Authors"
        - text:
          - key: link
          - "Link"
    picker_preview:
      gallery:
        image: /examples/contribution.png
        text: "Published paper (or article)"
    definitions:
      shortcode_name: contribution
      named_args:
        - editor_key: title
          type: string
        - editor_key: author
          type: string
        - editor_key: link
          type: string
          optional: true
        - editor_key: linktext
          type: string
          optional: true
    _inputs:
      title:
        type: textarea
        comment: "Title od the paper"
      author:
        type: textarea
      link:
        type: url  
      linktext:
        type: text
        comment: "e.g. DOI, PDF, URL, arXiv"
          
  hugo_teaser:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      text: "Teaser for section pages"
      metadata:
        - text:
          - key: text
    picker_preview:
      gallery:
        image: /examples/teaser.png
        text: "Teaser for section pages"
    definitions:
      shortcode_name: teaser
      named_args:
        - editor_key: text
          source_key: txt
          type: string
    _inputs:
      text:
        type: html
        options: 
          bold: true
          link: true
          bulletedlist: true
          indent: true
          undo: true
          redo: true
          
  hugo_quoteRight:
    template: hugo_shortcode_named_args
