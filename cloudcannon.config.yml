collection_groups:
  - heading: Pages
    collections:
      - sections
      - events
      - news
      - funding
  - heading: Data Files
    collections:
      - data
_inputs:
  layout:
    type: text
    hidden: true
    cascade: true
  outputs:
    hidden: true
  date:
    type: datetime
    options:
      timezone: Europe/Berlin
    comment: Publishing date
  lastmod:
    type: datetime
    options:
      timezone: Europe/Berlin
    comment: Last modification date
  title:
    type: text
    comment: Title of the page (<h1> at top of the page; also used for SEO and RSS)
  description:
    type: textarea
    comment: Used for SEO and RSS. Max. 150 characters!
    options: 
      show_count: true
  aliases:
    type: auto
    comment: Create redirects from old URLs to this URL
  navname:
    type: auto
    label: Navigation Name
    comment: "Used in breadcrumbs - optional, default: filename"
  teaser:
    type: html
    options:
      allow_custom_markup: false
      remove_custom_markup: false
      initial_height: 320
      bold: true
      bulletedlist: true
      format: p, h3
      image_size_attributes: true
      italic: true
      link: true
      styles: /css/editor.css
      subscript: true
      superscript: true
      show_count: true
  img:
    type: image
    label: Teaser image (max. 200kB)
    options:
    max_file_size: 200
    max_file_size_message: For SEO, keep this under 200kB.
  conferenceDateStart:
    type: date
    options:
      timezone: Europe/Berlin
  conferenceDateEnd:
    type: date
    options:
      timezone: Europe/Berlin
  conferenceLink:
    type: url  
  text:
