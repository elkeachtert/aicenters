_schema: _schema
source: /
paths:
  uploads: static/images
  uploads_filename:
  uploads_use_relative_path:
  static: static
  dam_uploads:
  dam_uploads_filename:
  dam_static:
  collections: content
  data: data
  layouts: layouts
  includes: layouts
data_config:
  newsTags:
    path: data/newstags.yaml
collections_config:
  sections:
    path: content
    glob:
      - '**/*.md'
      - '!dssgxmunich/*'
      - '!**/index.md'
    name: Sections
    icon: home
    disable_url: false
    description: ''
    _enabled_editors:
    _inputs:
      background:
        comment: Type of background
        hidden: true
      backgroundVideo:
        type: boolean
        comment: Indicates if a background video is used für medium and large devices
        hidden: true
      anchors:
        label: Anchors within this page
        comment: "Can be displayed with snippet Anchor Buttons (optional)."
        type: array
        options:
          preview:
            text:
              - key: title
          structures: _structures.anchors
      highlights:
        comment: "Highlight cards with link to news, events or pages."
        type: array
        options:
          preview:
            text:
              - key: highlightLinkText
          structures: _structures.highlights
      sectionlinks:
        label: Links to other sections 
        comment: "Appear at the bottom of the page (optional)."
        type: array
        hidden: false
      sectionlinks[*]:
        type: select
        options:
          allow_empty: true
          values:
            - team
            - directors
            - management
            - researchgroups
            - jrgs
            - tbfs
            - juniors
            - strategyboard
            - advisoryboard
            - opportunities
            - collaborations
            - partners
            - publications
            - researcha
            - researchb
            - researchc
            - forMembers
            - forPhDApplicants
            - forFJN
            - forJobCandidates
            - industryPartnerships
            - consulting
            - continuingEducation
            - schoolsAndOutreach
      sectionlinksTitle:
        label: "Title for section links (optional)"
      filterTag:
        label: Tag for posts to be filtered (optional)
        comment: "The filtered posts appear at the end of this section (optional)."
      filterTagTitle:
        label: "Title for filtered posts (optional)"
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      section:
        path: schemas/section.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
  events:
    path: content/events
    glob:
      - '**/index.md'
    name: Events
    icon: calendar_month
    disable_url: false
    description: ''
    _enabled_editors:
    _inputs:
      germanTitle: 
        hidden: true
        default: false
      outputs:
        type: multiselect
        options:
          - empty_type: array
            values:
              - HTML
              - Calendar
        hidden: true
        default:
          - HTML
          - Calendar
      layout:
        type: auto
        default: eventitem
      mcmlEvent:
        type: checkbox
        label: MCML Event
        comment: For MCML members only.
      description:
        type: textarea
        comment: Used for SEO, RSS and related events. Max. 150 characters!
        options: 
          show_count: true
      eventType:
        type: text
        comment: >-
          Appears above the title, e.g. Workshop, Lecture Series, etc. Has no
          effect on Related Events.
      eventDate.start:
        type: datetime
        options:
          timezone: Europe/Berlin
      eventDate.end:
        type: datetime
        options:
          timezone: Europe/Berlin
      eventDate.allDay:
        type: checkbox
        comment: All-day event (no time will be displayed)
      eventDate:
        type: object
        options:
          structures:
            style: select
            values:
              - preview:
                  text:
                    - ''
                  subtext:
                    - ' '
                  icon: calendar_clock
                  metadata:
                    - text: Start
                    - text:
                        - key: start
                      icon: today
                    - text: End
                    - text:
                        - key: end
                      icon: today
                    - text: All Day Event
                    - text:
                        - key: allDay
                        - false
                      icon: radio_button_checked
                value:
                  start:
                  end:
                  allDay:
      title:
        type: textarea
        comment: Title of the event
      subtitle:
        type: textarea
        comment: >-
          Either subtitle or speaker(s) must be specified, not both; appears
          below the title.
      location:
        type: textarea
      teaser:
        type: html
        comment: >-
          Teaser text, appears in event overview and as content, if no content
          is specified.
        options: 
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          bulletedlist: true
          format: p
          image_size_attributes: true
          italic: true
          link: true
          styles: /css/editor.css
          subscript: true
          superscript: true
      img:
        type: image
        label: Teaser image (max. 200kB)
        options:
          max_file_size: 200
          max_file_size_message: For SEO, keep this under 200kB.
      copyright:
        type: text
        label: Copyright for teaser image
      link:
        type: url
        label: External link to event
      zoom:
        type: url
        label: Zoom link (optional)
      tags:
        type: array
        comment: Used for related events.
      tags[*]:
        type: select
        options:
          allow_empty: false
          values:
            - summer-school
            - conference
            - workshop
            - panel
            - symposium
            - lecture
            - mcml-event
            - mcml-junior-members-event
            - mcml-education
            - german-ai-centers-event
            - entrepreneurship
      speakers:
        type: array
        options:
          preview:
            text:
              - key: name
            subtext:
              - key: affiliation
          structures: _structures.speakers
        comment: >-
          Either subtitle or speaker(s) must be specified, not both; appears
          below the title.
      moderators:
        type: array
        options:
          preview:
            text:
              - key: name
            subtext:
              - key: affiliation
          structures: _structures.speakers
      organizers:
        type: array
        options:
          preview:
            text:
              - key: name
            subtext:
              - key: affiliation
          structures: _structures.speakers
    create:
      path: '{date|year}-{date|month}-{date|day}-{slug}/index.md'
      _inputs:
        date:
          type: auto
          comment: Use the event date here
        slug:
          type: auto
          comment: This is used for your directory name
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      event:
        path: schemas/event.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
  news:
    path: content/news
    glob:
      - '**/index.md'
    name: News
    icon: newspaper
    disable_url: false
    description: ''
    _enabled_editors:
    _inputs:
      germanTitle: 
        hidden: true
        default: false
      layout:
        type: auto
        default: newsitem
      description:
        type: textarea
        comment: Used for SEO, RSS and related news. Max. 150 characters!
        options: 
          show_count: true
      title:
        type: textarea
        comment: Title of news item (<h1> at top of the page)
      subtitle:
        type: textarea
        comment: Subtitle of news item (<h2> next to image)
      teaser:
        type: html
        comment: >-
          Teaser text, appears in news overview and before content.
        options: 
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          bulletedlist: true
          format: p
          image_size_attributes: true
          italic: true
          link: true
          styles: /css/editor.css
          subscript: true
          superscript: true
      img:
        type: image
        label: Teaser image
        options:
          max_file_size: 200
          max_file_size_message: For SEO, keep this under 200kB.
      copyright:
        type: text
        comment: Copyright for teaser image
      tinyLogo:
        type: image
        label: Tiny logo appears right above the teaser image (optional)
        optional: true
        options:
          max_file_size: 200
          max_file_size_message: For SEO, keep this under 200kB.
      link:
        type: auto
        comment: External link to news item
      tags:
        type: array
        comment: Used for related news.
      tags[*]:
        type: select
        options:
          allow_empty: false
          values: data.newsTags
      year:
        comment: Year of publication (all papers in top journals in specified year will be displayed)
    create:
      path: '{date|year}-{date|month}-{date|day}-{slug}/index.md'
      _inputs:
        date:
          type: auto
          comment: Use the publishing date here
          cascade: true
        slug:
          type: auto
          comment: This is used for your directory name
          cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    schemas:
      news:
        path: schemas/news.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
      conference:
        path: schemas/conference.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
      journal:
        path: schemas/journal.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
        icon: notes
  funding:
    path: content/opportunities/for-phd-applicants
    glob:
      - '**/index.md'
    name: Matchmaking Calls
    icon: school
    disable_url: false
    description: ''
    create:
      path: '{slug}{date|year}/index.md'
      _inputs:
        date:
          type: auto
        slug:
          type: auto
          comment: This is used for your directory name (e.g. phd, dssg, ...)
          cascade: true
    disable_add: false
    disable_add_folder: false
    disable_file_actions: false
    _inputs:
      background:
        comment: Type of background
        hidden: true
      backgroundVideo:
        type: boolean
        comment: Indicates if a background video is used für medium and large devices
        hidden: true
      callOpen:
        type: select
        options:
          values: _select_data.boolean
        comment: 'Indicates, wether the call is open (and will be displayed first on the landing page)'
      currentCall:
        type: select
        options:
          values: _select_data.boolean
        comment: 'Indicates, wether the call is the current one (true: will be displayed first on the opportunities page; false: will be displayed on the opportunities page under "PhD Students From the Last Years".)'
      tickerText:
        comment: 'Text for ticker on the landing page, if the call is indicated as open'
      img:
        type: image
        label: Teaser image (max. 200kB)
        options:
          max_file_size: 200
          max_file_size_message: For SEO, keep this under 200kB.
      anchors:
        label: Anchors within this page
        comment: "Can be displayed with snippet Anchor Buttons (optional)."
        type: array
        options:
          preview:
            text:
              - key: title
          structures: _structures.anchors
    schemas:
      matchmaking:
        path: schemas/matchmaking.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
      phdApplication:
        path: schemas/phdApplication.md
        reorder_inputs: true
        hide_extra_inputs: false
        remove_empty_inputs: false
        remove_extra_inputs: false
  data:
    path: data
    glob:
      - '!publications/*'
      - '!unused/**'
      - '!mlcuPublications/*'
    name: Data Files
    icon: people
    disable_url: false
    description: ''
    preview:
    _enabled_editors:
    _inputs:
      bio:
        type: html
        options:
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          format: p
          image_size_attributes: true
        cascade: true
        optional: true
      contact:
        type: url
        cascade: true
      mail:
        type: email
        cascade: true
      title:
        type: select
        options:
          allow_empty: true
          values:
            - Prof. Dr.
            - Dr.
            - PD Dr.
