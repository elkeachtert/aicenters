      link:
        comment: ""
      text:
        comment: "Text to appear on the button (if empty 'Learn more')"
      size:
        comment: "Size of the button (default: medium)"
        type: select
        options:
          values:
            - medium
            - small

  hugo_gallery:
    template: hugo_shortcode_named_args
    inline: false
    preview:
      icon: collections
      text: "Gallery of three images"
