_snippets:
  hugo_teaser:
    template: hugo_shortcode_named_args
    mcmlType: text
    mcmlDescription: >-
      Large teaser text, to be used at the top of a page, directly after the title.
    mcmlLastMod: 2025-08-15
    mcmlExample: >
      {{< teaser txt="<p>Large teaser text for pages.</p><p>Lorem ipsum dolor sit amet, consectetur adipisici elit, sed eiusmod tempor
      incidunt ut labore et dolore magna aliqua. Lorem ipsum dolor sit amet, consectetur adipisici elit, sed eiusmod tempor incidunt
      ut labore et dolore magna aliqua.</p><p><strong>Text can be bold</strong></p><p>You can insert links:
      <a href=\"https://mcml.ai\">www.mcml.ai</a></p><p>You can insert lists</p><ul><li><p>list 1</p></li><li><p>list 2</p></li></ul>" >}}
    mcmlInputImages:
      - /examples/teaser_input.webp
    preview:
      text: Teaser
      subtext:
        - key: text
      image:
        - /examples/teaser.webp
    picker_preview:
      gallery:
        image: /examples/teaser.webp
        text: Teaser for pages
    definitions:
      shortcode_name: teaser
      named_args:
        - editor_key: text
          source_key: txt
          type: string
    _inputs:
      text:
        comment: Teaser text in html format
        type: html
        options:
          allow_custom_markup: false
          remove_custom_markup: false
          initial_height: 320
          bold: true
          bulletedlist: true
          format: p, h2, h3
          image_size_attributes: true
          italic: true
          link: true
          styles: /css/editor.css
          subscript: true
          superscript: true

  hugo_txtTwoCol:
    template: hugo_shortcode_named_args
    mcmlType: text
    mcmlDescription: >-
      Two column text paragraph for pages; left column title, right column text and optional image and linked button.
    mcmlLastMod: 2025-08-15
    mcmlExample: >
      {{< txtTwoCol title="Left column: Title in h2" titleSize="h2"
      txt1="<p>Right column: Text in large font.</p><p>Lorem ipsum dolor sit amet, consectetur adipisici elit, sed eiusmod tempor incidunt ut labore et dolore magna aliqua. 
      Lorem ipsum dolor sit amet, consectetur adipisici elit, sed eiusmod tempor incidunt ut labore et dolore magna aliqua.</p><p><strong>Text can be bold</strong></p>
      <p>You can insert links:&nbsp;<a href=\"https://mcml.ai\">www.mcml.ai</a></p><p>You can insert lists</p><ul><li><p>list 1</p></li><li><p>list 2</p></li></ul>" 
      link="https://mcml.ai" newWindow="true" img="/images/adobestock/adobeStock-109360299-FleischiPixel.jpeg" imgSize="big" noFloat="false" 
      positionID="phdCoordination" showAffiliation="true" contactTitle="Another Contact Title" linktext="MCML Website" >}}
    mcmlInputImages:
      - /examples/txtTwoCol_input1.webp
      - /examples/txtTwoCol_input2.webp
      - /examples/txtTwoCol_input3.webp
    preview:
      text: Paragraph (title left, text right)
      subtext:
        - key: title
      image: /examples/txtTwoCol.webp
      metadata:
        - text:
            - key: text
          image:
            - key: image
        - text:
            - template: titleSize {titleSize}
          icon: title
        - text:
            - template: List members with position {positionID}
          icon: user_attributes
        - text:
            - template: Link to {link}
          icon: east
    picker_preview:
      gallery:
        image: /examples/txtTwoCol.webp
        text: Paragraph (title left, text right)
    definitions:
      shortcode_name: txtTwoCol
      named_args:
        - editor_key: title
          type: string
        - editor_key: titleSize
          type: string
          optional: true
          default: h2
        - editor_key: text
          source_key: txt1
          type: string
        - editor_key: link
          type: string
          optional: true
        - editor_key: linkText
          source_key: linktext
          type: string
          optional: true
        - editor_key: newWindow
          type: string
          optional: true
          default: 'false'
        - editor_key: image
          source_key: img
          type: string
          optional: true
        - editor_key: imageSize
          source_key: imgSize
          type: string
          optional: true
          default: big
        - editor_key: noFloat
          type: string
          default: 'false'
          optional: true
        - editor_key: positionID
          type: string
          optional: true
        - editor_key: showAffiliation
          type: string
          optional: true
          default: 'false'
        - editor_key: contactTitle
          type: string
          optional: true
        - editor_key: backToTop
          type: string
          optional: true
          default: 'false'
    _inputs:
      title:
        type: textarea
        comment: Title of the paragraph, left column in <titleSize>
      titleSize:
        type: select
        comment: 'Size and level of the title; <h2 small> has the size of h3, <h3 big> has the size of h2 (default: <h2>)'
        options:
          values: _select_data.titleSize
      text:
        type: html
        comment: 'Text of the paragraph in html format, right column'
      link:
        type: url
        comment: 'URL for linked button, appears after the text (optional)'
      linkText:
        type: text
        comment: 'Text for linked button (optional, default: <Learn More>)'
      newWindow:
        type: select
        options:
          allow_empty: true
          values: _select_data.boolean
        comment: 'If true, opens URL in new window (default: <false>)'
      image:
        type: image
        comment: 'Image to appear right before text, can be floated by the text; max. file size 300 kB (optional)'
        options:
          max_file_size: 300
          max_file_size_message: For SEO, keep this under 300kB.
      imageSize:
        type: select
        options:
          values: _select_data.imgSize
        comment: 'Size of the image (default: <big>)'
      noFloat:
        type: select
        options:
          values: _select_data.boolean
        comment: 'If true, the image will not be flotaed by the text (default: <false>)'
      positionID:
        type: select
        options:
          allow_empty: true
          values: _select_data.positionIDs
        comment: >-
          Shows the contact details of all members with this position ID at the
          end of the paragraph (optional)
      showAffiliation:
        type: select
        options:
          allow_empty: true
          values: _select_data.boolean
        comment: 'If true, the affiliations are shown in contact details, e.g. Machine Lerning Consulting Unit (default: <false>)'
      contactTitle:
        type: text
        comment: 'Title for contact details (optional, default: <Contact>)'
      backToTop:
        type: select
        options:
          values: _select_data.boolean
        comment: 'If true, a small "Back To Top" button is shown at the bottom of the paragraph (default: <false>)'

